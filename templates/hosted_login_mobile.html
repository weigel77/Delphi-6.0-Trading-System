<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_browser_title }} | {{ app_identity.display_name }}</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Arial, Helvetica, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #101318;
            color: #f3f4f6;
        }

        main {
            min-height: 100vh;
            padding: 20px 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 360px;
            background: #1a1f27;
            border: 1px solid #2b3340;
            border-radius: 12px;
            padding: 24px 18px;
        }

        h1 {
            margin: 0 0 6px;
            font-size: 28px;
            letter-spacing: 0.08em;
        }

        p {
            margin: 0;
            color: #c8d0da;
            line-height: 1.5;
        }

        .login-meta {
            margin-top: 8px;
            font-size: 13px;
        }

        form {
            display: grid;
            gap: 14px;
            margin-top: 20px;
        }

        label {
            display: grid;
            gap: 8px;
            font-size: 14px;
            color: #e5e7eb;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #3b4554;
            border-radius: 8px;
            background: #0f141a;
            color: #f9fafb;
            font: inherit;
        }

        button {
            width: 100%;
            padding: 12px;
            border: 0;
            border-radius: 8px;
            background: #d1d5db;
            color: #111827;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .error-message {
            padding: 12px;
            border-radius: 8px;
            background: #3a1d1d;
            border: 1px solid #6b2626;
            color: #fecaca;
            font-size: 14px;
        }

        .login-footer {
            margin-top: 18px;
            display: grid;
            gap: 8px;
            font-size: 13px;
            color: #9ca3af;
        }

        .login-footer a {
            color: #d1d5db;
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main>
        <section class="login-card" aria-labelledby="mobile-login-title">
            <h1 id="mobile-login-title">DELPHI</h1>
            <p>Mobile hosted login</p>
            <p class="login-meta">{{ app_identity.page_kicker }}</p>

            <form method="post" action="{{ login_action_url }}">
                <input type="hidden" name="next" value="{{ next_path }}">

                <label for="hosted-mobile-email">
                    <span>Email</span>
                    <input id="hosted-mobile-email" name="email" type="email" value="{{ form_email }}" autocomplete="email" required>
                </label>

                <label for="hosted-mobile-password">
                    <span>Password</span>
                    <input id="hosted-mobile-password" name="password" type="password" autocomplete="current-password" required>
                </label>

                {% if error_message %}
                    <div class="error-message">{{ error_message }}</div>
                {% endif %}

                <button type="submit">Login</button>
            </form>

            <div class="login-footer">
                <span>{{ app_identity.version_label }}</span>
                <a href="{{ alternate_login_url }}">Switch to {{ alternate_branch|title }}</a>
            </div>
        </section>
    </main>
</body>
</html>
