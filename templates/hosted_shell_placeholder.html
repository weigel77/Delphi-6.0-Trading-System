{% extends "hosted_shell_base.html" %}

{% block hosted_content %}
    <section class="hosted-shell-panel">
        <div class="hosted-shell-panel-header">
            <div>
                <h2>{{ placeholder_title }}</h2>
                <p class="hosted-shell-subtle">This is a real hosted shell route, even where the deeper hosted backend still remains local-only for now.</p>
            </div>
        </div>
        <div class="hosted-shell-roadmap-grid">
            {% for item in placeholder_items %}
                <article class="hosted-shell-roadmap-card">
                    <p>{{ item }}</p>
                </article>
            {% endfor %}
        </div>
    </section>
{% endblock %}
