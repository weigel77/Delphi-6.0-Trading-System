<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_browser_title }} | {{ app_identity.display_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="delphi-launch-body" data-desktop-target="{{ desktop_target }}" data-mobile-target="{{ mobile_target }}" data-mobile-breakpoint="{{ mobile_breakpoint }}" data-explicit-view="{{ explicit_view }}">
    <main class="delphi-launch-shell">
        <section class="delphi-launch-panel">
            <div class="delphi-launch-mark"></div>
            <p class="delphi-launch-kicker">{{ app_identity.page_kicker }}</p>
            <h1>Routing Your Command Surface</h1>
            <p>Delphi 6.3 is detecting the best post-login experience for this device.</p>
            <div class="delphi-launch-spinner" aria-hidden="true"></div>
            <div class="delphi-launch-links">
                <a href="{{ desktop_home_url }}">Continue to Desktop</a>
                <a href="{{ mobile_home_url }}">Continue to Mobile</a>
            </div>
        </section>
    </main>
    <script>
        (() => {
            const root = document.body;
            const desktopTarget = root.dataset.desktopTarget || '{{ desktop_home_url }}';
            const mobileTarget = root.dataset.mobileTarget || '{{ mobile_home_url }}';
            const breakpoint = Number(root.dataset.mobileBreakpoint || '768');
            const explicitView = root.dataset.explicitView || '';
            const storageKey = 'delphi63PreferredShell';

            if (explicitView === 'desktop' || explicitView === 'mobile') {
                window.localStorage.setItem(storageKey, explicitView);
            }

            const preferredView = explicitView || window.localStorage.getItem(storageKey) || '';
            const isPhoneViewport = window.matchMedia(`(max-width: ${Math.max(0, breakpoint - 1)}px)`).matches;
            const target = preferredView === 'desktop'
                ? desktopTarget
                : (preferredView === 'mobile' ? mobileTarget : (isPhoneViewport ? mobileTarget : desktopTarget));

            window.setTimeout(() => {
                window.location.replace(target);
            }, 80);
        })();
    </script>
</body>
</html>
