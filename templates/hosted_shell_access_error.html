<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_browser_title }} | {{ app_identity.display_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="hosted-shell-body">
    <main class="hosted-shell-layout">
        <section class="hosted-shell-header-card hosted-shell-error-card">
            <p class="hosted-shell-kicker">{{ app_identity.page_kicker }}</p>
            <h1>{{ page_heading }}</h1>
            <p class="hosted-shell-copy">{{ page_copy }}</p>
            <div class="message message-warning hosted-shell-error-message">
                <strong>{{ error_code }}</strong>
                <span>{{ error_detail }}</span>
            </div>
        </section>
    </main>
</body>
</html>
