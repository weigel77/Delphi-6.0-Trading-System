<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_browser_title }} | {{ app_identity.display_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="hosted-shell-body">
    <main class="hosted-shell-layout">
        <section class="hosted-shell-header-card hosted-login-card">
            <div class="hosted-shell-panel-header">
                <div>
                    <p class="hosted-shell-kicker">{{ app_identity.page_kicker }}</p>
                    <h1>{{ page_heading }}</h1>
                    <p class="hosted-shell-copy">{{ page_copy }}</p>
                </div>
            </div>

            <form method="post" action="{{ url_for('hosted_login_entry') }}" class="hosted-login-form">
                <input type="hidden" name="next" value="{{ next_path }}">
                <div class="hosted-login-grid">
                    <div class="field-group">
                        <label for="hosted-email">Email</label>
                        <input id="hosted-email" name="email" type="email" value="{{ form_email }}" autocomplete="email" required>
                    </div>
                    <div class="field-group">
                        <label for="hosted-password">Password</label>
                        <input id="hosted-password" name="password" type="password" autocomplete="current-password" required>
                    </div>
                </div>
                {% if error_message %}
                    <div class="message message-warning hosted-shell-error-message">{{ error_message }}</div>
                {% endif %}
                <div class="hosted-shell-toolbar-actions">
                    <button type="submit">Sign In</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
