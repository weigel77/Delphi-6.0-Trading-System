<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1400" role="img" aria-label="Delphi oracle symbol">
  <defs>
    <linearGradient id="gold-stroke" x1="860" y1="410" x2="1540" y2="990" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7a4704"/>
      <stop offset="30%" stop-color="#b97a12"/>
      <stop offset="58%" stop-color="#f6bc34"/>
      <stop offset="78%" stop-color="#ffe690"/>
      <stop offset="100%" stop-color="#b66c08"/>
    </linearGradient>
    <linearGradient id="gold-flare" x1="260" y1="700" x2="2140" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5c84e" stop-opacity="0"/>
      <stop offset="20%" stop-color="#cb8711" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#fff6cb" stop-opacity="1"/>
      <stop offset="80%" stop-color="#cb8711" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f5c84e" stop-opacity="0"/>
