    <radialGradient id="orb-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd761" stop-opacity="0.68"/>
      <stop offset="50%" stop-color="#ffbc29" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffbc29" stop-opacity="0"/>
    </radialGradient>
    <filter id="line-glow" x="-20%" y="-20%" width="140%" height="140%">
