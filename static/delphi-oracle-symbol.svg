    </filter>
    <filter id="flare-glow" x="-20%" y="-180%" width="140%" height="460%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="orb-glow" x="-60%" y="-60%" width="220%" height="220%">
