      <path d="M954 846 H1446" stroke-width="3" opacity="0.84"/>
      <path d="M954 846 L954 702" stroke-width="1.9" opacity="0.72"/>
      <path d="M1446 846 L1446 702" stroke-width="1.9" opacity="0.72"/>
      <path d="M870 437 L1010 575" stroke-width="1.8" opacity="0.62"/>
      <path d="M1530 437 L1390 575" stroke-width="1.8" opacity="0.62"/>
      <path d="M870 962 L1010 826" stroke-width="1.5" opacity="0.38"/>
      <path d="M1530 962 L1390 826" stroke-width="1.5" opacity="0.38"/>
      <path d="M790 700 H932" stroke-width="3.2"/>
